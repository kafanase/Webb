        function decrypt(cipherText, key) {
            try {
                const keyHex = CryptoJS.enc.Utf8.parse(key);
                const decrypted = CryptoJS.AES.decrypt(cipherText, keyHex, {
                    mode: CryptoJS.mode.ECB,
                    padding: CryptoJS.pad.Pkcs7
                });
                const result = decrypted.toString(CryptoJS.enc.Utf8);
                return result.length > 5 ? result : null;
            } catch (e) {
                return null;
            }
        }

        function handleDecrypt() {
            const key = document.getElementById('decryption-key').value.trim();
            if (key.length === 0) return;

            const testSource = encryptedXray.length > 0 ? encryptedXray[0] : (encryptedSSH.length > 0 ? encryptedSSH[0] : null);
            
            if (testSource) {
                const check = decrypt(testSource, key);
                if (!check) {
                    showError();
                    return;
                }
            }

            const sshDec = encryptedSSH.map(c => decrypt(c, key)).filter(v => v);
            const xrayDec = encryptedXray.map(c => decrypt(c, key)).filter(v => v);

            renderItems(sshDec, 'ssh-list', 'fa-terminal', 'orange');
            renderItems(xrayDec, 'xray-list', 'fa-bolt', 'emerald');

            document.getElementById('auth-gate').style.opacity = '0';
            document.getElementById('auth-gate').style.pointerEvents = 'none';
            document.getElementById('secret-data').classList.remove('opacity-20', 'blur-sm', 'pointer-events-none');
            
            sessionStorage.setItem('cached_key', key);
        }

        function showError() {
            const input = document.getElementById('decryption-key');
            input.classList.add('border-red-500', 'bg-red-500/10');
            setTimeout(() => input.classList.remove('border-red-500', 'bg-red-500/10'), 1000);
        }

        function renderItems(items, containerId, icon, color) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            items.forEach((key, i) => {
                const div = document.createElement('div');
                div.className = 'glass-card p-4 rounded-xl flex items-center justify-between group';
                div.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden">
                        <div class="bg-${color}-500/20 text-${color}-400 w-10 h-10 rounded-lg flex items-center justify-center shrink-0">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p class="font-bold text-slate-200 truncate">${key.split('#')[1] || 'Конфиг #' + (i+1)}</p>
                            <p class="text-xs text-slate-500 truncate font-mono">${key.substring(0, 30)}...</p>
                        </div>
                    </div>
                    <button onclick="copyToClipboard('${key}')" class="hover:bg-blue-600 p-2 rounded-lg transition-colors">
                        <i class="fa-solid fa-copy"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function renderMTProto() {
            const container = document.getElementById('mtproto-list');
            mtprotoLinks.forEach(link => {
                const url = new URL(link.replace('tg://', 'https://t.me/'));
                const server = url.searchParams.get('server');
                const div = document.createElement('div');
                div.className = 'glass-card p-4 rounded-xl border-l-4 border-l-blue-500';
                div.innerHTML = `
                    <div class="mb-3">
                        <p class="text-xs text-slate-500 uppercase font-bold">Server</p>
                        <p class="text-sm font-mono truncate text-blue-300">${server}</p>
                    </div>
                    <a href="${link}" class="block w-full text-center bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white py-2 rounded-lg text-sm font-bold transition-all">
                        Подключить
                    </a>
                `;
                container.appendChild(div);
            });
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function resetAccess() {
            sessionStorage.removeItem('cached_key');
            location.reload();
        }

        window.onload = () => {
            renderMTProto();
            const saved = sessionStorage.getItem('cached_key');
            if (saved) {
                document.getElementById('decryption-key').value = saved;
                handleDecrypt();
            }
        };

        document.getElementById('decryption-key').onkeypress = (e) => { if(e.key === 'Enter') handleDecrypt(); };
