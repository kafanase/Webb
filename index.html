    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "proxy-hub-counter.firebaseapp.com",
            projectId: "proxy-hub-counter",
            storageBucket: "proxy-hub-counter.appspot.com",
            messagingSenderId: "",
            appId: ""
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'proxy-hub-app';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function initCounter(user) {
            if (!user) return;

            // Path: /artifacts/{appId}/public/data/stats
            const statsDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats');

            try {
                const docSnap = await getDoc(statsDocRef);
                
                if (!docSnap.exists()) {
                    await setDoc(statsDocRef, { views: 1 });
                } else {
                    await updateDoc(statsDocRef, {
                        views: increment(1)
                    });
                }

                onSnapshot(statsDocRef, (doc) => {
                    if (doc.exists()) {
                        const count = doc.data().views;
                        document.getElementById('count-value').innerText = count.toLocaleString();
                        document.getElementById('visit-counter').classList.remove('opacity-0');
                    }
                }, (error) => console.error("Snapshot error:", error));

            } catch (error) {
                console.error("Firestore error:", error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                initCounter(user);
            } else {
                signInAnonymously(auth).catch(err => console.error("Auth error:", err));
            }
        });
    </script>

        function renderList(items, containerId, icon, accentColor) {
            const container = document.getElementById(containerId);
            items.forEach((key, index) => {
                let name = "Конфигурация";
                if (key.includes('#')) {
                    name = decodeURIComponent(key.split('#')[1]);

                            <p class="text-xs text-slate-500 truncate font-mono">${key.substring(0, 45)}...</p>
                        </div>
                    </div>
                    <button onclick="copyToClipboard('${key}', this)" class="bg-slate-700 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition-all flex items-center gap-2 whitespace-nowrap shrink-0">
                        <i class="fa-solid fa-copy text-sm"></i>
                        <span class="hidden sm:inline">Копировать</span>
                    </button>

                container.appendChild(div);
            });

                        Подключить
                    </a>
                `;
                container.appendChild(div);

        function copyToClipboard(text, btn) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            
            const originalContent = btn.innerHTML;
            btn.classList.add('copy-success');
            btn.innerHTML = '<i class="fa-solid fa-check"></i> <span class="hidden sm:inline">Готово</span>';
            
            setTimeout(() => {
                toast.style.display = 'none';
                btn.innerHTML = originalContent;
                btn.classList.remove('copy-success');
            }, 2000);
        }
